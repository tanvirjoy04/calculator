<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header>1234536</header>
    <main>
      <div class="rowOne">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="op">%</button>
        <button class="op">c</button>
      </div>
      <div class="rowTwo">
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="op">x</button>
        <button class="op">÷</button>
      </div>
      <div class="rowThree">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="op">+</button>
        <button class="op">-</button>
      </div>
      <div class="rowFour">
        <button>0</button>
        <button class="op">.</button>
        <button class="op">=</button>
      </div>
    </main>
  </div>
</body>
</html>
