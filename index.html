<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header id="display">0</header>
    <main>
      <button onclick="displayBackspace()">⌫</button>
      <div class="main-div-rowOne">
        <button onclick="displaySeven()">7</button>
        <button onclick="displayEight()">8</button>
        <button onclick="displayNine()">9</button>
        <button onclick="displayPercentage()">%</button>
        <button onclick="displayClear()" class="div-button-clear">c</button>
      </div>
      <div class="main-div-rowTwo">
        <button onclick="displayFour()">4</button>
        <button onclick="displayFive()">5</button>
        <button onclick="displaySix()">6</button>
        <button onclick="assignMul()" class="div-button-op">x</button>
        <button onclick="assignDiv()" class="div-button-op">÷</button>
      </div>
      <div class="main-div-rowThree">
        <button onclick="displayOne()">1</button>
        <button onclick="displayTwo()">2</button>
        <button onclick="displayThree()">3</button>
        <button onclick="assignPlus()" class="div-button-op">+</button>
        <button onclick="assignMinus()" class="div-button-op">-</button>
      </div>
      <div class="main-div-rowFour">
        <button onclick="displayZero()">0</button>
        <button onclick="displayDot()">.</button>
        <button onclick="displayPie()">π</button>
        <button onclick="displayRoot()">√</button>
        <button onclick="operate()" class="div-button-equal">=</button>
      </div>
    </main>
  </div>
</body>
<script src="./script.js"></script>
</html>
